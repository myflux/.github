name: PR Approval Process (Reusable)

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      pr_title:
        required: true
        type: string
      pr_url:
        required: true
        type: string
      pr_author:
        required: true
        type: string
      repo_name:
        required: true
        type: string
    secrets:
      ORG_APPROVAL_TOKEN:
        required: true

jobs:
  create-approval-issue:
    name: Create Approval Issue
    runs-on: ubuntu-latest
    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Read approval-config.yml
        id: config
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Files in root ==="
          ls -la
          echo "=== Contents of approval-config.yml ==="
          cat approval-config.yml
          echo "=== yq version ==="
          yq --version
          echo "=== yq output ==="
          yq '.team_name' approval-config.yml
          yq '.team_lead' approval-config.yml

          echo "team_lead=$(yq '.team_lead' approval-config.yml)"         >> $GITHUB_OUTPUT
          echo "product_owner=$(yq '.product_owner' approval-config.yml)" >> $GITHUB_OUTPUT
          echo "eng_manager=$(yq '.eng_manager' approval-config.yml)"     >> $GITHUB_OUTPUT
          echo "architect=$(yq '.architect' approval-config.yml)"         >> $GITHUB_OUTPUT
          echo "director=$(yq '.director' approval-config.yml)"           >> $GITHUB_OUTPUT
          echo "team_name=$(yq '.team_name' approval-config.yml)"         >> $GITHUB_OUTPUT

      - name: Create approval issue
        id: create-issue
        uses: actions/github-script@v7
        env:
          TEAM_LEAD: ${{ steps.config.outputs.team_lead }}
          PRODUCT_OWNER: ${{ steps.config.outputs.product_owner }}
          ENG_MANAGER: ${{ steps.config.outputs.eng_manager }}
          ARCHITECT: ${{ steps.config.outputs.architect }}
          DIRECTOR: ${{ steps.config.outputs.director }}
          TEAM_NAME: ${{ steps.config.outputs.team_name }}
          PR_TITLE: ${{ inputs.pr_title }}
          PR_URL: ${{ inputs.pr_url }}
          PR_AUTHOR: ${{ inputs.pr_author }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO_NAME: ${{ inputs.repo_name }}
        with:
          github-token: ${{ secrets.ORG_APPROVAL_TOKEN }}
          script: |
            const teamLead     = process.env.TEAM_LEAD;
            const productOwner = process.env.PRODUCT_OWNER;
            const engManager   = process.env.ENG_MANAGER;
            const architect    = process.env.ARCHITECT;
            const director     = process.env.DIRECTOR;
            const teamName     = process.env.TEAM_NAME;
            const prTitle      = process.env.PR_TITLE;
            const prUrl        = process.env.PR_URL;
            const prAuthor     = process.env.PR_AUTHOR;
            const prNumber     = process.env.PR_NUMBER;
            const repoName     = process.env.REPO_NAME;

            const body = [
              '## PR Approval Request',
              '',
              '| Field | Value |',
              '|-------|-------|',
              '| **Team** | ' + teamName + ' |',
              '| **Repo** | ' + repoName + ' |',
              '| **PR** | [' + prTitle + '](' + prUrl + ') |',
              '| **Author** | @' + prAuthor + ' |',
              '',
              '---',
              '',
              '## Approval Checklist',
              '',
              '### Stage 1 — Team Review',
              '- [ ] **Team Assignee** — Initial review complete',
              '',
              '### Stage 2 — Leadership Sign-off',
              '- [ ] **Tech Lead** ' + teamLead,
              '- [ ] **Product Owner** ' + productOwner,
              '- [ ] **Engineering Manager** ' + engManager,
              '',
              '### Stage 3 — Architecture Review',
              '- [ ] **Architect** ' + architect,
              '',
              '### Stage 4 — Director Sign-off',
              '- [ ] **Engineering Director** ' + director,
              '',
              '---',
              '> ✅ Once all boxes are checked the PR will be unblocked for merge.',
              '> ❌ Close this issue to reject the PR.',
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: 'approvals',
              title: '[' + teamName + '] Approval: ' + prTitle + ' (#' + prNumber + ')',
              body,
              labels: ['pending-assignee', teamName.toLowerCase().replace(/\s+/g, '-')],
            });

            core.setOutput('issue_number', String(issue.data.number));
            core.setOutput('issue_url', issue.data.html_url);

      - name: Post issue link on PR
        uses: actions/github-script@v7
        env:
          ISSUE_URL: ${{ steps.create-issue.outputs.issue_url }}
          PR_NUMBER: ${{ inputs.pr_number }}
        with:
          github-token: ${{ secrets.ORG_APPROVAL_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: '## 🔐 Approval Process Started\n\n'
                  + 'This PR requires multi-stage approval before it can be merged.\n\n'
                  + '➡️ **Track progress:** ' + process.env.ISSUE_URL + '\n\n'
                  + 'The merge button will be unblocked automatically once all approvals are collected.'
            });

      - name: Block PR merge
        uses: actions/github-script@v7
        env:
          ISSUE_URL: ${{ steps.create-issue.outputs.issue_url }}
        with:
          github-token: ${{ secrets.ORG_APPROVAL_TOKEN }}
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              description: 'Awaiting multi-stage approval',
              context: 'approval-process',
              target_url: process.env.ISSUE_URL
            });
