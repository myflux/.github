name: PR Approval Process (Reusable)

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      pr_title:
        required: true
        type: string
      pr_url:
        required: true
        type: string
      pr_author:
        required: true
        type: string
      pr_reviewer:
        required: true
        type: string
      repo_name:
        required: true
        type: string
    secrets:
      ORG_APPROVAL_TOKEN:
        required: true

jobs:
  create-approval-issue:
    name: Create Approval Issue
    runs-on: ubuntu-latest
    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Read approval-config.yml
        id: config
        run: |
          # Helper to normalize value to JSON array
          normalize_array() {
            local key="$1"
            local val=$(yq ".$key" approval-config.yml)
            if [[ "$val" == "null" ]]; then
              echo "[]"
            elif [[ "$val" == "["* ]]; then
              yq -o=json ".$key" approval-config.yml
            else
              echo "[\"$val\"]"
            fi
          }

          echo "team_leads=$(normalize_array 'team_lead')"           >> $GITHUB_OUTPUT
          echo "product_owners=$(normalize_array 'product_owner')"   >> $GITHUB_OUTPUT
          echo "eng_managers=$(normalize_array 'eng_manager')"       >> $GITHUB_OUTPUT
          echo "architects=$(normalize_array 'architect')"           >> $GITHUB_OUTPUT
          echo "directors=$(normalize_array 'director')"             >> $GITHUB_OUTPUT
          echo "team_name=$(yq '.team_name' approval-config.yml)"    >> $GITHUB_OUTPUT

      - name: Create approval issue
        id: create-issue
        uses: actions/github-script@v7
        env:
          TEAM_LEADS: ${{ steps.config.outputs.team_leads }}
          PRODUCT_OWNERS: ${{ steps.config.outputs.product_owners }}
          ENG_MANAGERS: ${{ steps.config.outputs.eng_managers }}
          ARCHITECTS: ${{ steps.config.outputs.architects }}
          DIRECTORS: ${{ steps.config.outputs.directors }}
          TEAM_NAME: ${{ steps.config.outputs.team_name }}
          PR_TITLE: ${{ inputs.pr_title }}
          PR_URL: ${{ inputs.pr_url }}
          PR_AUTHOR: ${{ inputs.pr_author }}
          PR_REVIEWER: ${{ inputs.pr_reviewer }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO_NAME: ${{ inputs.repo_name }}
        with:
          github-token: ${{ secrets.ORG_APPROVAL_TOKEN }}
          script: |
            const teamLeads     = JSON.parse(process.env.TEAM_LEADS || '[]');
            const productOwners = JSON.parse(process.env.PRODUCT_OWNERS || '[]');
            const engManagers   = JSON.parse(process.env.ENG_MANAGERS || '[]');
            const architects    = JSON.parse(process.env.ARCHITECTS || '[]');
            const directors     = JSON.parse(process.env.DIRECTORS || '[]');
            const teamName      = process.env.TEAM_NAME;
            const prTitle       = process.env.PR_TITLE;
            const prUrl         = process.env.PR_URL;
            const prAuthor      = process.env.PR_AUTHOR;
            const prReviewer    = process.env.PR_REVIEWER;
            const prNumber      = process.env.PR_NUMBER;
            const repoName      = process.env.REPO_NAME;

            // Helper to generate checkboxes for a role (any one can approve)
            const checkboxes = (role, people) => {
              if (people.length === 0) return [];
              if (people.length === 1) {
                return ['- [ ] **' + role + '** ' + people[0]];
              }
              return people.map(p => '- [ ] **' + role + '** ' + p + ' _(any one)_');
            };

            const lines = [
              '## PR Approval Request',
              '',
              '| Field | Value |',
              '|-------|-------|',
              '| **Team** | ' + teamName + ' |',
              '| **Repo** | ' + repoName + ' |',
              '| **PR** | [' + prTitle + '](' + prUrl + ') |',
              '| **Author** | @' + prAuthor + ' |',
              '| **Reviewed by** | @' + prReviewer + ' |',
              '',
              '---',
              '',
              '## Approval Checklist',
              '',
              '### Stage 1 — Team Review ✅',
              '- [x] **Team Reviewer** @' + prReviewer + ' — Code review approved',
              '',
              '### Stage 2 — Leadership Sign-off',
              ...checkboxes('Tech Lead', teamLeads),
              ...checkboxes('Product Owner', productOwners),
              ...checkboxes('Engineering Manager', engManagers),
              '',
              '### Stage 3 — Architecture Review',
              ...checkboxes('Architect', architects),
              '',
              '### Stage 4 — Director Sign-off',
              ...checkboxes('Engineering Director', directors),
              '',
              '---',
              '> ✅ Once all required boxes are checked the PR will be unblocked for merge.',
              '> _(For roles with multiple people, any one approval is sufficient)_',
              '> ❌ Close this issue to reject the PR.',
            ];

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: 'approvals',
              title: '[' + teamName + '] Approval: ' + prTitle + ' (#' + prNumber + ')',
              body: lines.join('\n'),
              labels: ['pending-leadership', teamName.toLowerCase().replace(/\s+/g, '-')],
            });

            core.setOutput('issue_number', String(issue.data.number));
            core.setOutput('issue_url', issue.data.html_url);
            
            // Store arrays for later steps
            core.setOutput('team_leads', process.env.TEAM_LEADS);
            core.setOutput('product_owners', process.env.PRODUCT_OWNERS);
            core.setOutput('eng_managers', process.env.ENG_MANAGERS);

      - name: Ping leadership on approval issue
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.create-issue.outputs.issue_number }}
          TEAM_LEADS: ${{ steps.config.outputs.team_leads }}
          PRODUCT_OWNERS: ${{ steps.config.outputs.product_owners }}
          ENG_MANAGERS: ${{ steps.config.outputs.eng_managers }}
          PR_REVIEWER: ${{ inputs.pr_reviewer }}
        with:
          github-token: ${{ secrets.ORG_APPROVAL_TOKEN }}
          script: |
            const teamLeads     = JSON.parse(process.env.TEAM_LEADS || '[]');
            const productOwners = JSON.parse(process.env.PRODUCT_OWNERS || '[]');
            const engManagers   = JSON.parse(process.env.ENG_MANAGERS || '[]');
            const prReviewer    = process.env.PR_REVIEWER;
            
            const allPeople = [...teamLeads, ...productOwners, ...engManagers].join(' ');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: 'approvals',
              issue_number: Number(process.env.ISSUE_NUMBER),
              body: '✅ **Stage 1 complete** — Code review approved by @' + prReviewer + '.\n\n'
                  + allPeople
                  + ' — your approvals are needed for Stage 2. Please check your boxes above.'
            });

      - name: Post issue link on PR
        uses: actions/github-script@v7
        env:
          ISSUE_URL: ${{ steps.create-issue.outputs.issue_url }}
          PR_NUMBER: ${{ inputs.pr_number }}
          PR_REVIEWER: ${{ inputs.pr_reviewer }}
          TEAM_LEADS: ${{ steps.config.outputs.team_leads }}
          PRODUCT_OWNERS: ${{ steps.config.outputs.product_owners }}
          ENG_MANAGERS: ${{ steps.config.outputs.eng_managers }}
        with:
          github-token: ${{ secrets.ORG_APPROVAL_TOKEN }}
          script: |
            const teamLeads     = JSON.parse(process.env.TEAM_LEADS || '[]');
            const productOwners = JSON.parse(process.env.PRODUCT_OWNERS || '[]');
            const engManagers   = JSON.parse(process.env.ENG_MANAGERS || '[]');
            
            const allPeople = [...teamLeads, ...productOwners, ...engManagers].join(' ');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: '## 🔐 Approval Process Started\n\n'
                  + 'Code review complete (approved by @' + process.env.PR_REVIEWER + '). '
                  + 'This PR now requires leadership approval before merge.\n\n'
                  + '➡️ **Track progress:** ' + process.env.ISSUE_URL + '\n\n'
                  + '**Awaiting:** ' + allPeople + '\n\n'
                  + 'The merge button will be unblocked automatically once all approvals are collected.'
            });

      - name: Block PR merge
        uses: actions/github-script@v7
        env:
          ISSUE_URL: ${{ steps.create-issue.outputs.issue_url }}
          PR_NUMBER: ${{ inputs.pr_number }}
        with:
          github-token: ${{ secrets.ORG_APPROVAL_TOKEN }}
          script: |
            // Get PR to find head SHA
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(process.env.PR_NUMBER)
            });
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: pr.data.head.sha,
              state: 'pending',
              description: 'Awaiting multi-stage approval',
              context: 'approval-process',
              target_url: process.env.ISSUE_URL
            });
